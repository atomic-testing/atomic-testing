# Marks this example as its OWN pnpm workspace root so it installs standalone (its own lockfile,
# isolated from the monorepo's root workspace — it is intentionally NOT a member of that one).
#
# The atomic-testing dependencies are declared at ^0.97.0 (the release that adds
# DesktopDatePickerDriver.pickDate / setValue and SimpleTreeViewDriver.selectItem) and resolve
# straight from the npm registry, mirroring a real consumer install. The excludes opt the pinned,
# recently-published versions past a minimum-release-age supply-chain gate; they are a no-op
# where no such gate is configured.
packages:
  - '.'
minimumReleaseAgeExclude:
  - '@atomic-testing/component-driver-html@0.97.0'
  - '@atomic-testing/component-driver-mui-v9@0.97.0'
  - '@atomic-testing/component-driver-mui-x-v9@0.97.0'
  - '@atomic-testing/core@0.97.0'
  - '@atomic-testing/dom-core@0.97.0'
  - '@atomic-testing/playwright@0.97.0'
  - '@atomic-testing/react-18@0.97.0'
  - '@atomic-testing/react-19@0.97.0'
  - '@atomic-testing/react-core@0.97.0'
