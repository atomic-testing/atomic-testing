name: Verify pull request

on:
  pull_request:
  merge_group:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build once - this job builds all packages and caches the results
  build:
    name: Build packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup with build
        uses: ./.github/actions/builderui-setup

      - name: Cache built packages
        uses: actions/cache@v6
        with:
          path: |
            packages/*/build
            packages/*/dist
          key: build-packages-${{ github.sha }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: built-packages
          path: |
            packages/*/build
            packages/*/dist
          retention-days: 1

  # Lint and type-check jobs that need built packages
  lint:
    name: Linting and formatting
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup dependencies only
        uses: ./.github/actions/deps-setup

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: built-packages
          path: packages

      - name: Run code formatter
        run: pnpm check:style

      - name: Run linter
        run: pnpm check:lint

  type-check:
    name: Type checking
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup dependencies only
        uses: ./.github/actions/deps-setup

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: built-packages
          path: packages

      - name: Run type checker
        run: pnpm check:type

  # Public API freeze gate: fails if any in-scope package's exported surface
  # drifts from its committed etc/<pkg>.api.md report. Regenerate locally with
  # `pnpm -r check:api` after running each package's `api-extractor run --local`.
  # See agent-docs/adr/006-1.0-api-freeze-and-evolution.md.
  api-report:
    name: API surface freeze
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup dependencies only
        uses: ./.github/actions/deps-setup

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: built-packages
          path: packages

      - name: Verify public API reports
        run: pnpm check:api

  # Test matrix for component drivers
  component-driver-tests:
    name: Test ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 'HTML components'
            directory: 'component-driver-html-test'
          # MUI v5 / MUI X v5 reached end of support (2026-06-27) and are no longer
          # tested in CI. See agent-docs/adr/005-drop-mui-5-support.md
          - name: 'MUI v6 components'
            directory: 'component-driver-mui-v6-test'
          - name: 'MUI v7 components'
            directory: 'component-driver-mui-v7-test'
          - name: 'MUI X v6 components'
            directory: 'component-driver-mui-x-v6-test'
          - name: 'MUI X v7 components'
            directory: 'component-driver-mui-x-v7-test'
          - name: 'MUI X v8 components'
            directory: 'component-driver-mui-x-v8-test'
          - name: 'MUI v9 components'
            directory: 'component-driver-mui-v9-test'
          - name: 'MUI X v9 components'
            directory: 'component-driver-mui-x-v9-test'
          - name: 'Vue 3 components'
            directory: 'vue-3-test'
          - name: 'Astryx components'
            directory: 'component-driver-astryx-test'
          - name: 'Radix components'
            directory: 'component-driver-radix-test'
          - name: 'PrimeVue components'
            directory: 'component-driver-primevue-test'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup dependencies only
        uses: ./.github/actions/deps-setup

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: built-packages
          path: packages

      - name: Build UI
        run: pnpm build:ui
        working-directory: ./package-tests/${{ matrix.directory }}

      - name: Run test
        run: pnpm test:dom
        working-directory: ./package-tests/${{ matrix.directory }}

  # Interactor conformance suite (TCK, #1046): the same specs run against every
  # interactor to prove they honor the one jsdom-defined contract (ADR-006). This
  # runs the jsdom (DOMInteractor) leg; the real-browser Playwright leg needs the
  # matched Playwright browser and is tracked as follow-up. The suite itself lives
  # in packages/internal-interactor-conformance.
  interactor-conformance-test:
    name: Test interactor conformance (TCK)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup dependencies only
        uses: ./.github/actions/deps-setup

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: built-packages
          path: packages

      - name: Run conformance suite (DOM)
        run: pnpm test:dom
        working-directory: ./package-tests/internal-interactor-conformance-test

  # Storybook integration fixture — runs Driver-powered stories as real-browser
  # Vitest tests (@storybook/addon-vitest, Vitest browser mode, Chromium) through
  # @atomic-testing/storybook. See issue #951.
  storybook-vitest-test:
    name: Test Storybook integration (addon-vitest)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup dependencies only
        uses: ./.github/actions/deps-setup

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: built-packages
          path: packages

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps
        working-directory: ./package-tests/storybook-test

      - name: Run Storybook tests
        run: pnpm test:storybook
        working-directory: ./package-tests/storybook-test

  # Angular fixtures — drive real Angular components through AngularInteractor
  # in a real browser (Vitest browser mode, Chromium), once with zone.js loaded
  # and once zoneless: the adapter fixtures (angular-2x-test, plain Vitest) and
  # the Angular Material driver suites (three-file pattern). See issues #1013 /
  # #1025 and agent-docs/adr/013-angular-shared-core-thin-packages.md.
  #
  # angular-21/-22 mark one scenario `it.todo` rather than asserting it green:
  # ApplicationRef.whenStable() does not appear to wait for a zone.js-tracked
  # pending macrotask (e.g. bare setTimeout) on Angular 21/22 the way it does
  # on Angular 20 — see the comment in each fixture's
  # __tests__/CounterComponent.browser.test.ts.
  angular-vitest-test:
    name: Test ${{ matrix.name }} (zone + zoneless)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 'Angular 20 adapter'
            directory: 'angular-20-test'
            command: 'pnpm test:browser'
          - name: 'Angular 21 adapter'
            directory: 'angular-21-test'
            command: 'pnpm test:browser'
          - name: 'Angular 22 adapter'
            directory: 'angular-22-test'
            command: 'pnpm test:browser'
          - name: 'Angular Material v20 components'
            directory: 'component-driver-angular-material-v20-test'
            command: 'pnpm test:dom'
          - name: 'Angular Material v21 components'
            directory: 'component-driver-angular-material-v21-test'
            command: 'pnpm test:dom'
          - name: 'Angular Material v22 components'
            directory: 'component-driver-angular-material-v22-test'
            command: 'pnpm test:dom'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup dependencies only
        uses: ./.github/actions/deps-setup

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: built-packages
          path: packages

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps
        working-directory: ./package-tests/${{ matrix.directory }}

      - name: Run Angular tests
        run: ${{ matrix.command }}
        working-directory: ./package-tests/${{ matrix.directory }}

  # React legacy (16/17) adapter test — guards the React 16/17 path against
  # silently regressing back onto the React 18/19 (@testing-library/react) graph.
  # See agent-docs/adr/006-1.0-api-freeze-and-evolution.md and issue #959.
  react-legacy-test:
    name: Test React legacy adapter
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup dependencies only
        uses: ./.github/actions/deps-setup

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: built-packages
          path: packages

      - name: Run test
        run: pnpm test:dom
        working-directory: ./packages/react-legacy

  # DOMInteractor unit tests (jsdom). Currently the runInteraction-seam routing
  # guard (#1052): mechanically asserts every mutating primitive funnels through
  # the single template-method seam React/Vue override, so a new base primitive
  # can't silently skip act()/nextTick() wrapping. See
  # packages/dom-core/__tests__/runInteractionRouting.dom.test.ts.
  dom-core-test:
    name: Test DOMInteractor (dom-core)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup dependencies only
        uses: ./.github/actions/deps-setup

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: built-packages
          path: packages

      - name: Run test
        run: pnpm test:dom
        working-directory: ./packages/dom-core

  # create-atomic-testing scaffolder — pure-logic unit tests (detect / recipes /
  # generate / apply) plus the recipe-catalog sync-check (REC-SYNC-*), which
  # fails if any package a recipe emits does not exist or its version / peer
  # range drifts from the real workspace, and the coverage check (COV-*), which
  # fails if a shipped component-driver package is not registered in the
  # scaffolder registry (and so would be silently missing from the CLI and the
  # generated support matrix). Self-contained (no `needs: build`): the checks
  # build only this package, the unit tests import from src.
  create-atomic-testing-test:
    name: Test create-atomic-testing scaffolder
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup dependencies only
        uses: ./.github/actions/deps-setup

      - name: Build scaffolder
        run: pnpm --filter create-atomic-testing build

      - name: Recipe-catalog sync-check
        run: pnpm --filter create-atomic-testing check:recipes

      - name: Scaffolder-coverage check
        run: pnpm --filter create-atomic-testing check:coverage

      # Skill governance (SKILL-SYNC-*): the four .claude/skills/*/SKILL.md ship
      # through the scaffolder, so their claim-drift gate, the embedded-copy
      # freshness check, and the golden-fixture structural harness run here. All
      # dependency-free (node --test / plain Node), reading repo-root source.
      - name: Skill-sync check
        run: pnpm check:skill-sync

      - name: Golden-fixture structural check
        run: pnpm check:golden-fixtures

      - name: Skill harness unit tests
        run: pnpm test:skills

      - name: Run unit tests
        run: pnpm test:dom
        working-directory: ./packages/create-atomic-testing

  # Example test (separate since it has different setup)
  example-mui-signup-form-test:
    name: Test example MUI signup form
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: PNPM Setup
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install .
        working-directory: ./examples/example-mui-signup-form

      - name: Run dom test
        run: pnpm test:dom
        working-directory: ./examples/example-mui-signup-form

  example-astryx-workspace-test:
    name: Test example Astryx workspace
    runs-on: ubuntu-latest
    # Standalone example: it installs from its OWN lockfile and consumes PUBLISHED
    # @atomic-testing/* packages, so it does not depend on the monorepo build
    # (no `needs: build`) — it runs immediately for the fastest regression signal.
    # Fast check only: type-check + jsdom unit tests (e2e needs browsers + a dev server).
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: PNPM Setup
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install .
        working-directory: ./examples/example-astryx-workspace

      - name: Type check
        run: pnpm check:type
        working-directory: ./examples/example-astryx-workspace

      - name: Run dom test
        run: pnpm test:dom
        working-directory: ./examples/example-astryx-workspace

  example-shadcn-workspace-test:
    name: Test example shadcn workspace
    runs-on: ubuntu-latest
    # Standalone example: it installs from its OWN lockfile and consumes PUBLISHED
    # @atomic-testing/* packages, so it does not depend on the monorepo build
    # (no `needs: build`) — it runs immediately for the fastest regression signal.
    # Fast check only: type-check + jsdom unit tests (e2e needs browsers + a dev server).
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: PNPM Setup
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install .
        working-directory: ./examples/example-shadcn-workspace

      - name: Type check
        run: pnpm check:type
        working-directory: ./examples/example-shadcn-workspace

      - name: Run dom test
        run: pnpm test:dom
        working-directory: ./examples/example-shadcn-workspace
