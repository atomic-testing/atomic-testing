name: Verify pull request

on:
  pull_request:
  merge_group:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build once - this job builds all packages and caches the results
  build:
    name: Build packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup with build
        uses: ./.github/actions/builderui-setup

      - name: Cache built packages
        uses: actions/cache@v6
        with:
          path: |
            packages/*/build
            packages/*/dist
          key: build-packages-${{ github.sha }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: built-packages
          path: |
            packages/*/build
            packages/*/dist
          retention-days: 1

  # Lint and type-check jobs that need built packages
  lint:
    name: Linting and formatting
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup dependencies only
        uses: ./.github/actions/deps-setup

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: built-packages
          path: packages

      - name: Run code formatter
        run: pnpm check:style

      - name: Run linter
        run: pnpm check:lint

  type-check:
    name: Type checking
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup dependencies only
        uses: ./.github/actions/deps-setup

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: built-packages
          path: packages

      - name: Run type checker
        run: pnpm check:type

  # Public API freeze gate: fails if any in-scope package's exported surface
  # drifts from its committed etc/<pkg>.api.md report. Regenerate locally with
  # `pnpm -r check:api` after running each package's `api-extractor run --local`.
  # See agent-docs/adr/006-1.0-api-freeze-and-evolution.md.
  api-report:
    name: API surface freeze
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup dependencies only
        uses: ./.github/actions/deps-setup

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: built-packages
          path: packages

      - name: Verify public API reports
        run: pnpm check:api

  # Test matrix for component drivers
  component-driver-tests:
    name: Test ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 'HTML components'
            directory: 'component-driver-html-test'
          # MUI v5 / MUI X v5 reached end of support (2026-06-27) and are no longer
          # tested in CI. See agent-docs/adr/005-drop-mui-5-support.md
          - name: 'MUI v6 components'
            directory: 'component-driver-mui-v6-test'
          - name: 'MUI v7 components'
            directory: 'component-driver-mui-v7-test'
          - name: 'MUI X v6 components'
            directory: 'component-driver-mui-x-v6-test'
          - name: 'MUI X v7 components'
            directory: 'component-driver-mui-x-v7-test'
          - name: 'MUI X v8 components'
            directory: 'component-driver-mui-x-v8-test'
          - name: 'MUI v9 components'
            directory: 'component-driver-mui-v9-test'
          - name: 'MUI X v9 components'
            directory: 'component-driver-mui-x-v9-test'
          - name: 'Vue 3 components'
            directory: 'vue-3-test'
          - name: 'Astryx components'
            directory: 'component-driver-astryx-test'
          - name: 'Radix components'
            directory: 'component-driver-radix-test'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup dependencies only
        uses: ./.github/actions/deps-setup

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: built-packages
          path: packages

      - name: Build UI
        run: pnpm build:ui
        working-directory: ./package-tests/${{ matrix.directory }}

      - name: Run test
        run: pnpm test:dom
        working-directory: ./package-tests/${{ matrix.directory }}

  # Storybook integration fixture — runs Driver-powered stories as real-browser
  # Vitest tests (@storybook/addon-vitest, Vitest browser mode, Chromium) through
  # @atomic-testing/storybook. See issue #951.
  storybook-vitest-test:
    name: Test Storybook integration (addon-vitest)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup dependencies only
        uses: ./.github/actions/deps-setup

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: built-packages
          path: packages

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps
        working-directory: ./package-tests/storybook-test

      - name: Run Storybook tests
        run: pnpm test:storybook
        working-directory: ./package-tests/storybook-test

  # React legacy (16/17) adapter test — guards the React 16/17 path against
  # silently regressing back onto the React 18/19 (@testing-library/react) graph.
  # See agent-docs/adr/006-1.0-api-freeze-and-evolution.md and issue #959.
  react-legacy-test:
    name: Test React legacy adapter
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup dependencies only
        uses: ./.github/actions/deps-setup

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: built-packages
          path: packages

      - name: Run test
        run: pnpm test:dom
        working-directory: ./packages/react-legacy

  # Example test (separate since it has different setup)
  example-mui-signup-form-test:
    name: Test example MUI signup form
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: PNPM Setup
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install .
        working-directory: ./examples/example-mui-signup-form

      - name: Run dom test
        run: pnpm test:dom
        working-directory: ./examples/example-mui-signup-form

  example-astryx-workspace-test:
    name: Test example Astryx workspace
    runs-on: ubuntu-latest
    # Standalone example: it installs from its OWN lockfile and consumes PUBLISHED
    # @atomic-testing/* packages, so it does not depend on the monorepo build
    # (no `needs: build`) — it runs immediately for the fastest regression signal.
    # Fast check only: type-check + jsdom unit tests (e2e needs browsers + a dev server).
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: PNPM Setup
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install .
        working-directory: ./examples/example-astryx-workspace

      - name: Type check
        run: pnpm check:type
        working-directory: ./examples/example-astryx-workspace

      - name: Run dom test
        run: pnpm test:dom
        working-directory: ./examples/example-astryx-workspace
