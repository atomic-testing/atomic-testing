name: Documentation CI

on:
  pull_request:
    paths:
      - 'docs/**'
      # The API docs are generated from package source TSDoc (TypeDoc), so a
      # source-only change can break the docs build. Verify it on those PRs too,
      # not just docs/** edits — otherwise the break only surfaces post-merge on
      # deploy (see the bare-<input> MDX failure that motivated this).
      - 'packages/**'
      - '.github/workflows/doc-ci.yml'

jobs:
  deploy:
    name: Verify documentation build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Setup dependencies only
        uses: ./.github/actions/deps-setup

      - name: Check doc accuracy (imports match real package exports)
        run: node docs/scripts/check-doc-accuracy.mjs

      - name: Check doc/driver sync (excluded packages are EOL-flagged, not presented as normal options)
        run: node docs/scripts/check-doc-driver-sync.mjs

      - name: Build packages
        run: ./publish.sh --build-only

      # Runs after the build so create-atomic-testing's dist exists: the check
      # regenerates the Framework × Runner matrix from the CLI compatibility
      # registry and fails if the committed docs/src/generated/supportMatrix.json
      # is stale — keeping the published matrix in lockstep with what the
      # scaffolder actually offers.
      - name: Check support matrix is in sync with the CLI compatibility registry
        run: node docs/scripts/check-support-matrix-sync.mjs

      - name: Install documentation dependencies
        run: pnpm install .
        working-directory: ./docs

      - name: Verify documentation build
        run: pnpm build
        working-directory: ./docs
